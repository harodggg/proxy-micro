services:
  http-proxy:
    build:
      context: .
      dockerfile: Dockerfile.http
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json
    restart: unless-stopped
    networks:
      - proxy-net

  socks5-proxy:
    build:
      context: .
      dockerfile: Dockerfile.socks5
    ports:
      - "1080:1080"
    volumes:
      - ./config.json:/app/config.json
    restart: unless-stopped
    networks:
      - proxy-net

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "8088:8088"
    volumes:
      - ./config.json:/app/config.json
    restart: unless-stopped
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge
